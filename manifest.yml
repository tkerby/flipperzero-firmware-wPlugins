description: >
  Automates certain Lasko Tower Fans (e.g. model 2519) by cycling the power ON and OFF at configurable intervals.
  
  Features:
  - Custom ON/OFF durations (default 20m ON, 40m OFF)
  - Configurable directly on the Flipper Zero
  - Status display with countdown
  - Custom Icon

