name: Build FAP

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ufbt
        run: pip install ufbt

      - name: Build
        run: ufbt

      - name: Upload FAP
        uses: actions/upload-artifact@v4
        with:
          name: ble_clicker.fap
          path: dist/ble_clicker.fap
