name: Build and release (.fap)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ufbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install ufbt

      - name: Compute version
        id: ver
        run: |
          # Base version for this fork.
          BASE="0.9+pt2257"
          BUILD="${GITHUB_RUN_NUMBER}"
          VERSION="${BASE}.${BUILD}"
          TAG="v0.9-pt2257.${BUILD}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Apply version to sources (CI only)
        run: python .github/scripts/set_version.py "${{ steps.ver.outputs.version }}"

      - name: Build
        run: ufbt build

      - name: Collect artifacts
        run: |
          mkdir -p dist

          # ufbt typically puts the built fap under ~/.ufbt/build/
          FAP_PATH="$(find "$HOME/.ufbt/build" -maxdepth 1 -name '*.fap' | head -n 1)"
          if [ -z "$FAP_PATH" ]; then
            echo "Could not find .fap under $HOME/.ufbt/build; searching workspace..." >&2
            FAP_PATH="$(find . -name '*.fap' | head -n 1)"
          fi
          if [ -z "$FAP_PATH" ]; then
            echo "No .fap produced" >&2
            exit 1
          fi

          cp "$FAP_PATH" dist/
          (cd dist && sha256sum *.fap > SHA256SUMS.txt)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fap
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.ver.outputs.tag }}"
          name: "${{ steps.ver.outputs.tag }}"
          prerelease: false
          body: |
            Automated build from commit: ${{ github.sha }}
            App version: ${{ steps.ver.outputs.version }}

            Install: copy the `.fap` to `/ext/apps/GPIO/` on your Flipper, then run it.
          files: |
            dist/*.fap
            dist/SHA256SUMS.txt
