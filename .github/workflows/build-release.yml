name: Build MiBand NFC Writer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: MiBand NFC Writer
  OUTPUT_FILE: miband_nfc_writer.fap

jobs:
  build-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        with:
          app-dir: .
          sdk-index-url: https://up.momentum-fw.dev/firmware/directory.json
          sdk-channel: release

      - name: Verify and prepare FAP
        run: |
          if [ ! -f "dist/miband_nfc.fap" ]; then
            echo "ERROR: FAP file not found!"
            ls -la dist/
            exit 1
          fi
          cp dist/miband_nfc.fap $OUTPUT_FILE
          echo "FAP created: $OUTPUT_FILE"
          ls -la $OUTPUT_FILE

      - name: Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SIZE=$(stat -c%s "$OUTPUT_FILE")
          SHA=$(sha1sum "$OUTPUT_FILE" | cut -d' ' -f1)
          
          TEXT="New build: $APP_NAME
          Size: $SIZE bytes
          SHA1: $SHA"
          
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F caption="$TEXT" \
            -F document=@"$OUTPUT_FILE"
