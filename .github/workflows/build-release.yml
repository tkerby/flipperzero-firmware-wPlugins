name: "Build RELEASE for Momentum Firmware (MiBand NFC Writer)"

on:
  push:
    branches:
      - main
      - master

env:
  APP_NAME: "MiBand NFC Writer"
  REPO_URL: "https://github.com/LucaTomei/flipper-miband-nfc-writer"
  OUTPUT_FILE: "miband_nfc_writer.fap"

jobs:
  ufbt-build-action:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Momentum_Release
            sdk-index-url: https://up.momentum-fw.dev/firmware/directory.json
            sdk-channel: release

    name: "ufbt: Build for ${{ matrix.name }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build with ufbt
        id: build-app
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        with:
          app-dir: "."
          sdk-index-url: ${{ matrix.sdk-index-url }}
          sdk-channel: ${{ matrix.sdk-channel }}

      - name: Debug dist folder
        run: |
          echo "== DIST CONTENT =="
          ls -lah dist || true

      - name: Copy FAP file
        run: |
          if [ ! -f dist/miband_nfc.fap ]; then
            echo "❌ FAP file not found!"
            exit 1
          fi

          cp dist/miband_nfc.fap ${{ env.OUTPUT_FILE }}
          echo "✅ Copied FAP to ${{ env.OUTPUT_FILE }}"

      - name: Cache output file
        uses: actions/cache@v3
        with:
          path: ${{ env.OUTPUT_FILE }}
          key: ${{ runner.os }}-${{ env.OUTPUT_FILE }}-${{ github.sha }}

  notify-telegram:
    needs: ufbt-build-action
    runs-on: ubuntu-latest

    steps:
      - name: Restore output file from cache
        uses: actions/cache@v3
        with:
          path: ${{ env.OUTPUT_FILE }}
          key: ${{ runner.os }}-${{ env.OUTPUT_FILE }}-${{ github.sha }}

      - name: Send file to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID1: ${{ secrets.TELEGRAM_CHAT_ID1 }}
          TELEGRAM_CHAT_ID2: ${{ secrets.TELEGRAM_CHAT_ID2 }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          FILE_SIZE=$(stat -c%s "${{ env.OUTPUT_FILE }}")
          SHA1=$(sha1sum "${{ env.OUTPUT_FILE }}" | awk '{print $1}')

          TEXT="🧿 <b>${{ env.APP_NAME }}</b>
<a href=\"${{ env.REPO_URL }}\">Repo</a>

<b>Commit:</b>
<pre>${COMMIT_MESSAGE}</pre>

<b>Size:</b> ${FILE_SIZE} bytes
<b>SHA1:</b>
<pre>${SHA1}</pre>"

          send() {
            curl -s -X POST https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument \
              -F chat_id=$1 \
              -F parse_mode=HTML \
              -F caption="$TEXT" \
              -F document=@${{ env.OUTPUT_FILE }}
          }

          send ${TELEGRAM_CHAT_ID1}
          send ${TELEGRAM_CHAT_ID2}
