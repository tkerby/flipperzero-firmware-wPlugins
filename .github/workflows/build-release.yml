name: "Build MiBand NFC Writer - Momentum Release"

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: "MiBand NFC Writer"
  REPO_URL: "https://github.com/LucaTomei/flipper-miband-nfc-writer"
  FAP_SOURCE_FILE: "dist/miband_nfc.fap"
  OUTPUT_FILE: "miband_nfc_writer.fap"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        with:
          app-dir: "."
          sdk-index-url: "https://up.momentum-fw.dev/firmware/directory.json"
          sdk-channel: "release"

      - name: Verify build output
        run: |
          echo "Checking build directory..."
          ls -la dist/
          
          if [ ! -f "${{ env.FAP_SOURCE_FILE }}" ]; then
            echo "ERROR: FAP file not found!"
            echo "Files in dist/:"
            ls -la dist/
            exit 1
          fi
          
          echo "FAP file found:"
          ls -la "${{ env.FAP_SOURCE_FILE }}"

      - name: Prepare release file
        run: |
          cp "${{ env.FAP_SOURCE_FILE }}" "${{ env.OUTPUT_FILE }}"
          echo "Release file created: ${{ env.OUTPUT_FILE }}"
          ls -la "${{ env.OUTPUT_FILE }}"
          
          # Mostra alcune info sul file
          echo "File size: $(stat -c%s "${{ env.OUTPUT_FILE }}") bytes"
          echo "SHA256: $(sha256sum "${{ env.OUTPUT_FILE }}" | cut -d' ' -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: "miband-nfc-writer"
          path: "${{ env.OUTPUT_FILE }}"
          retention-days: 7

  telegram-notify:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: "miband-nfc-writer"
          
      - name: Verify downloaded file
        run: |
          if [ ! -f "${{ env.OUTPUT_FILE }}" ]; then
            echo "ERROR: Downloaded FAP file not found!"
            exit 1
          fi
          echo "File verified:"
          ls -la "${{ env.OUTPUT_FILE }}"

      - name: Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Verifica che i secrets siano configurati
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "WARNING: Telegram secrets not configured. Skipping notification."
            exit 0
          fi
          
          # Prepara le info del file
          FILE_SIZE=$(stat -c%s "${{ env.OUTPUT_FILE }}")
          FILE_SHA256=$(sha256sum "${{ env.OUTPUT_FILE }}" | cut -d' ' -f1)
          SHORT_SHA=${GITHUB_SHA:0:8}
          
          # Crea il messaggio
          MESSAGE="🚀 *New Build: ${{ env.APP_NAME }}*
          
          📦 *Repository:* [${{ env.APP_NAME }}](${{ env.REPO_URL }})
          🔧 *Commit:* \`$SHORT_SHA\`
          💾 *File:* \`${{ env.OUTPUT_FILE }}\`
          📏 *Size:* $FILE_SIZE bytes
          🔐 *SHA256:* \`${FILE_SHA256:0:16}...\`
          📅 *Built:* $(date +'%Y-%m-%d %H:%M:%S UTC')

          ✅ *Build completed successfully!*"
          
          # Invia a Telegram
          echo "Sending to Telegram..."
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document=@"${{ env.OUTPUT_FILE }}" \
            -F caption="$MESSAGE" \
            -F parse_mode="Markdown" \
            -F disable_notification="false"
          
          echo "Telegram notification sent!"
